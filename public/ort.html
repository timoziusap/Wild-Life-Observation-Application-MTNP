<!DOCTYPE html>
<html lang="de">
<head>
    <title>Wild Life Observation - Ort</title>
    <meta charset="utf-8">

    <!-- eigenes Stylesheet -->
    <link rel="stylesheet" href="css/style.css">

    <!-- jQuery zuerst, dann die eigenen Skripte -->
    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

    <!-- eigene Skripte: erst die Helfer, dann die Seitenlogik, dann die Karte -->
    <script type="text/javascript" src="js/api.js"></script>
    <script type="text/javascript" src="js/ort.js"></script>

    <!-- eigenes Karten-Skript (AP8) -->
    <script type="text/javascript" src="js/maps.js"></script>

    <!-- Google Maps wird ueber das Backend geladen (/maps-api), damit der API Key nicht ins Repo kommt. -->
    <script async defer src="/maps-api"></script>
</head>
<body>
<div class="centerdiv">

    <header><h1>Wild Life Observation</h1></header>

    <!-- einfache Navigation zwischen den Seiten -->
    <nav>
        <a href="index.html">Startseite</a>
        <a href="tier.html">Tier</a>
        <a href="ort.html">Ort</a>
    </nav>

    <!-- ===================== Schritt 2: Ort und Abschluss ===================== -->
    <section class="left">
        <h2>Schritt 2: Ort</h2>

        <!-- ---------- Bereich 1: Neuer Ort ---------- -->
        <h3>Neuen Ort anlegen</h3>

        <label>Bezeichnung des Ortes:</label>
        <input type="text" id="shorttitle" placeholder="z.B. Waldlichtung Nord">

        <label>Beschreibung (optional):</label>
        <input type="text" id="description" placeholder="kurze Beschreibung">

        <label>Latitude:</label>
        <!-- schreibgeschuetzt: wird nur ueber die Karte gesetzt -->
        <input type="text" id="latitude" readonly="readonly">

        <label>Longitude:</label>
        <input type="text" id="longitude" readonly="readonly">

        <br>
        <button type="button" id="standortSuchen">Standort suchen</button>
        <button type="button" id="ortSpeichern">Ort speichern</button>

        <hr>

        <!-- ---------- Bereich 2: Vorhandenen Ort verwenden ---------- -->
        <h3>Vorhandenen Ort verwenden</h3>

        <label>Ort auswaehlen:</label>
        <!-- wird per AJAX aus GET /locations gefuellt -->
        <select id="locationSelect">
            <option value="">-- bitte waehlen --</option>
        </select>

        <hr>

        <!-- ---------- Melder und Abschluss ---------- -->
        <label>Erfasst von:</label>
        <input type="text" id="reporter" placeholder="Name des Melders">

        <br>
        <!-- speichert die komplette Sichtung (Tier + Ort + Melder + Zeit) -->
        <button type="button" id="weiter">Weiter</button>
    </section>

    <!-- ===================== Karte (maps.js) ===================== -->
    <section class="right">
        <h2>Karte</h2>
        <!--
          Karten-Container fuer maps.js. ort.js haengt einen Klick-Listener
          an die Karte: ein Klick (oder "Standort suchen") fuellt Latitude
          und Longitude und setzt einen Marker ueber zeigeOrtAufKarte().
        -->
        <div id="map" style="width:100%; height:400px; background:#e9e9e9;">
            <p style="padding:10px; color:#777;">
                Hier erscheint die Karte (maps.js). Auf die Karte klicken, um die Koordinaten zu setzen.
            </p>
        </div>
    </section>

    <footer>Wild Life Observation App &ndash; Hochschule Aalen</footer>
</div>
</body>
</html>
