<!DOCTYPE html>
<html lang="de">
<head>
    <title>Wild Life Observation - Beobachtung</title>
    <meta charset="utf-8">
    <!-- sorgt dafuer dass die Seite auf dem Handy in echter Geraetebreite angezeigt wird -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- eigenes Stylesheet -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Bootstrap Icons (kostenlos, MIT). Liefert die Symbole als Schrift. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- DataTables CSS (Tabellen-Anzeige) -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.10.16/css/jquery.dataTables.min.css">

    <!-- Leaflet CSS fuer die OpenStreetMap Karte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <!-- jQuery zuerst, dann DataTables -->
    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script type="text/javascript" src="https://cdn.datatables.net/1.10.16/js/jquery.dataTables.min.js"></script>

    <!-- eigene Skripte: erst die Helfer, dann der Dialog, dann die Karte -->
    <script type="text/javascript" src="js/api.js"></script>
    <script type="text/javascript" src="js/observation.js"></script>

    <!-- Leaflet (OpenStreetMap) zuerst, dann unser Karten-Skript -->
    <script type="text/javascript" src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="text/javascript" src="js/maps.js"></script>
</head>
<body>
<div class="centerdiv">

    <header><h1>Wild Life Observation</h1></header>

    <!-- einfache Navigation zwischen den Seiten -->
    <!-- Navigation oben: auf dem Laptop als Leiste sichtbar -->
    <nav>
        <a href="index.html">Startseite</a>
        <a href="tier.html">Tiersichtung anlegen</a>
        <a href="search.html">Suchen</a>
        <a href="counter.html">Counter</a>
        <a href="schutzzeiten.html">Schutzzeiten</a>
    </nav>

    <!-- untere Leiste mit Symbolen, erscheint nur auf dem Handy -->
    <nav class="bottom-nav">
        <a href="index.html"><i class="bi bi-house"></i><span>Start</span></a>
        <a href="tier.html"><i class="bi bi-binoculars"></i><span>Sichtung</span></a>
        <a href="search.html"><i class="bi bi-search"></i><span>Suchen</span></a>
        <a href="counter.html"><i class="bi bi-calculator"></i><span>Counter</span></a>
        <a href="schutzzeiten.html"><i class="bi bi-shield-check"></i><span>Schutz</span></a>
    </nav>

    <!-- ===================== Dialog 3: Beobachtung erfassen ===================== -->
    <section class="left">
        <h2>Beobachtung erfassen</h2>
        <form id="newObservation">
            <label>Tier:</label>
            <!-- wird per AJAX aus GET /animals gefuellt -->
            <select name="animal" id="animalSelect" required="required">
                <option value="">-- bitte wählen --</option>
            </select>

            <label>Ort:</label>
            <!-- wird per AJAX aus GET /locations gefuellt -->
            <select name="location" id="locationSelect" required="required">
                <option value="">-- bitte wählen --</option>
            </select>

            <label>Datum:</label>
            <input type="date" name="date" required="required">

            <label>Uhrzeit:</label>
            <input type="time" name="time" required="required">

            <br>
            <input type="submit" id="newObservationButton" value="Beobachtung speichern">
        </form>

        <h3>Vorhandene Beobachtungen</h3>
        <button id="loadObservationTable">Laden</button>
        <table id="observationTable" class="display" cellspacing="0" width="100%">
            <thead>
            <tr>
                <th>ID</th>
                <th>Tier</th>
                <th>Ort</th>
                <th>Datum</th>
                <th>Uhrzeit</th>
                <th>Aktion</th>
            </tr>
            </thead>
        </table>
    </section>

    <!-- ===================== Karte (Marius, maps.js) ===================== -->
    <section class="right">
        <h2>Karte</h2>
        <!--
          Karten-Container fuer Marius' maps.js.
          observation.js ruft beim Auswaehlen eines Ortes
          zeigeOrtAufKarte(lat, lng) auf. Diese Funktion schreibt
          Marius in maps.js und laesst hier die Karte erscheinen.
        -->
        <div id="map" style="width:100%; height:400px; background:#e9e9e9;"></div>
    </section>

    <footer>Wild Life Observation App &ndash; Hochschule Aalen</footer>
</div>
</body>
</html>
