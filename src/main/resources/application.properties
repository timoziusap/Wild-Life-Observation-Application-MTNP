spring.application.name=EntwicklungVonInfoSystemen_Projekt

# Datenbank (HSQLDB, file-based, liegt im Home-Verzeichnis unter ~/wildlifedb)
spring.datasource.driver-class-name=org.hsqldb.jdbc.JDBCDriver
spring.datasource.url=jdbc:hsqldb:file:~/wildlifedb
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
# show-sql nur fuer die Entwicklung, vor der Abgabe auf false setzen
spring.jpa.show-sql=true

# Statische Ressourcen (Webclient) aus dem public/-Ordner im Projektroot bedienen
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:./public/

# Google Maps API Key fuer /maps-api (siehe MapsController).
# Der Key steht NICHT hier im Repo, sondern kommt aus der Umgebungsvariable GOOGLE_MAPS_KEY.
# Auf Render wird die Variable in den Environment Settings gesetzt.
# Lokal kann jeder die Variable selbst setzen, sonst bleibt der Wert leer.
google.maps.key=${GOOGLE_MAPS_KEY:}
