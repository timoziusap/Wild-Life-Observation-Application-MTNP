spring.application.name=EntwicklungVonInfoSystemen_Projekt

# Standardmaessig laeuft das dev-Profil (lokal mit HSQLDB).
# Auf Render wird SPRING_PROFILES_ACTIVE=prod gesetzt, dann greift Postgres.
spring.profiles.active=dev

# JPA / Hibernate (gilt fuer beide Profile)
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update

# Statische Ressourcen (Webclient) aus dem public/-Ordner im Projektroot bedienen
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:./public/
