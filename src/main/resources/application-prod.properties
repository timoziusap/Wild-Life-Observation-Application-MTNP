# prod-Profil: Postgres auf Render. Die Zugangsdaten kommen aus Umgebungsvariablen,
# damit kein Passwort im GitHub-Repo landet. Werte werden in Render gesetzt.
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# In der Produktion kein SQL-Logging
spring.jpa.show-sql=false

# Tabellen einmalig neu aufbauen (Schema war kaputt). DANACH wieder auf update setzen!
spring.jpa.hibernate.ddl-auto=create
