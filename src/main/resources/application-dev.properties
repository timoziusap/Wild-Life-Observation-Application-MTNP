# dev-Profil: lokale Datenbank (HSQLDB, file-based, liegt unter ~/wildlifedb).
# Bleibt zwischen Neustarts erhalten, solange man lokal startet (Eclipse).
spring.datasource.driver-class-name=org.hsqldb.jdbc.JDBCDriver
spring.datasource.url=jdbc:hsqldb:file:~/wildlifedb
spring.datasource.username=sa
spring.datasource.password=

# show-sql nur fuer die Entwicklung
spring.jpa.show-sql=true
